<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <title>Test Nube Repaso Completo · Test Interactivo</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <link rel="stylesheet" href="../style.css" />
    <script src="../assets/error-lab.js"></script>
    <link rel="icon" type="image/svg+xml" href="../assets/favicons/cloud.svg" />
  </head>
  <body>
    <div id="root"></div>
    <script type="text/babel">
      const preguntas = [
        { enunciado: "Una empresa quiere migrar sus servidores desde una infraestructura on-premise a la nube. ¿Cuál es la principal ventaja de este cambio?", opciones: ["Garantizar capacidad de cómputo sobredimensionada de forma permanente.", "Mantener el control del hardware y su mantenimiento.", "Incrementar los costes fijos asociados a la infraestructura tecnológica.", "Ajustar los recursos de cómputo según la demanda del negocio."], correcta: 3 },
        { enunciado: "¿Cuál de las siguientes opciones NO es una característica propia de la computación en la nube?", opciones: ["Autoservicio bajo demanda para gestionar recursos.", "Acceso a los servicios a través de internet.", "Solo se facturan los recursos utilizados.", "Aprovisionamiento definido de antemano."], correcta: 3 },
        { enunciado: "¿Cuál es la principal diferencia entre una nube pública, una nube privada y una nube híbrida?", opciones: ["El tipo de sistema operativo que utilizan.", "Quién es el propietario y cómo se comparten los recursos.", "El número de usuarios que pueden acceder.", "El lenguaje de programación de las aplicaciones."], correcta: 1 },
        { enunciado: "¿Cuál es una ventaja real de la nube?", opciones: ["Escala bajo demanda.", "Es más barata siempre.", "No requiere administración técnica.", "Elimina la necesidad de planificar la capacidad."], correcta: 0 },
        { enunciado: "¿Cuál es la principal ventaja económica de pasar de un modelo on-premise a la nube?", opciones: ["Se convierte la inversión fija en hardware en un gasto variable por uso.", "Se eliminan por completo todos los gastos de TI al transferirlos al proveedor.", "El proveedor asume todos los riesgos de seguridad de la nube.", "Se incrementan los costes fijos pero aumenta el rendimiento general del sistema."], correcta: 0 },
        { enunciado: "¿Cuál es la principal diferencia entre los modelos SaaS, PaaS e IaaS en computación en la nube?", opciones: ["El grado de responsabilidad que asume el proveedor en el mantenimiento del hardware físico.", "El nivel de control y gestión que tiene el usuario sobre la infraestructura y el software.", "El tipo de licenciamiento del sistema operativo utilizado.", "El rendimiento de las aplicaciones desplegadas."], correcta: 1 },
        { enunciado: "¿Cuál de los siguientes ejemplos NO está correctamente asociado a su modelo de servicio en la nube?", opciones: ["Amazon AWS como ejemplo de IaaS.", "Google Drive como ejemplo de SaaS.", "Microsoft Azure como ejemplo de IaaS.", "WordPress instalado como ejemplo de SaaS."], correcta: 3 },
        { enunciado: "En un modelo IaaS (Infrastructure as a Service), ¿qué componentes son responsabilidad del usuario?", opciones: ["Aplicaciones, datos, sistema operativo y middleware.", "Aplicaciones y datos.", "Servidores físicos y red.", "Virtualización y almacenamiento."], correcta: 0 },
        { enunciado: "¿En qué situación tiene más sentido utilizar una estrategia multicloud?", opciones: ["Cuando una empresa quiere consolidar la infraestructura y reducir el número de servidores físicos.", "Cuando se utilizan servicios de un único proveedor para simplificar la gestión.", "Cuando se combinan servicios de varios proveedores para evitar dependencia de uno solo.", "Cuando se requiere alta disponibilidad dentro de una misma región usando múltiples cuentas de un único proveedor."], correcta: 2 },
        { enunciado: "¿Cuál de las siguientes opciones es correcta sobre regiones y zonas de disponibilidad?", opciones: ["Una región está formada por varias Availability Zones independientes entre sí.", "Una Availability Zone contiene varias regiones dentro de ella.", "Una región está en un único centro de datos físico.", "Las regiones y las Availability Zones son exactamente lo mismo."], correcta: 0 },
        { enunciado: "Una empresa que maneja datos personales quiere desplegar su aplicación en AWS. ¿Qué criterio puede ser determinante a la hora de elegir una región?", opciones: ["El tipo de hardware utilizado en los centros de datos.", "La legislación y normativas de protección de datos aplicables en esa región.", "El número de cuentas de usuario creadas en AWS.", "La interfaz de la consola de AWS en ese país."], correcta: 1 },
        { enunciado: "¿Por qué es importante elegir correctamente la región en la nube donde se despliega una aplicación?", opciones: ["Porque mejora la latencia al estar cerca de los usuarios, ayuda a cumplir normativas legales y puede optimizar disponibilidad y costes.", "Porque garantiza automáticamente la seguridad total de los datos y elimina la necesidad de copias de seguridad.", "Porque permite usar cualquier región sin impacto en rendimiento, costes o cumplimiento legal.", "Ninguna de las anteriores."], correcta: 0 },
        { enunciado: "¿Qué afirmación describe mejor la relación entre Región y Availability Zone?", opciones: ["Una región es una AZ con más recursos.", "Una AZ puede pertenecer a varias regiones.", "Una región contiene varias AZ independientes.", "Varias regiones forman una sola AZ."], correcta: 2 },
        { enunciado: "¿Qué mejora principalmente un despliegue en varias Availability Zones?", opciones: ["La velocidad de acceso de las instancias.", "El tiempo de respuesta de la aplicación.", "El coste de la infraestructura.", "La tolerancia a fallos del sistema."], correcta: 3 },
        { enunciado: "¿Cuál de las siguientes asociaciones entre un servicio de AWS y su función es correcta?", opciones: ["EC2: almacenamiento de objetos para guardar archivos.", "S3: servicio de bases de datos relacionales gestionadas.", "VPC: red privada donde se despliegan los recursos en la nube.", "IAM: servicio para crear máquinas virtuales."], correcta: 2 },
        { enunciado: "¿Qué es el Free Tier de AWS y por qué es importante conocerlo?", opciones: ["Un conjunto de servicios gratuitos disponibles para los usuarios sin límites.", "Un periodo de prueba con límites de uso gratuitos que ayudan a aprender y evitar costes inesperados.", "Un servicio que bloquea automáticamente cualquier gasto inesperado en la cuenta.", "Una herramienta exclusiva para empresas grandes con ventajas a partir de cierto gasto."], correcta: 1 },
        { enunciado: "¿Cuál es el objetivo principal de la Calculadora de precios de AWS?", opciones: ["Monitorizar el consumo real y generar facturas mensuales.", "Crear y desplegar recursos directamente en AWS.", "Estimar el coste de distintos servicios antes de desplegarlos y comparar configuraciones.", "Aplicar automáticamente descuentos por uso prolongado."], correcta: 2 },
        { enunciado: "¿Cuál de las siguientes limitaciones de la Calculadora de precios de AWS es correcta?", opciones: ["No figuran todos los servicios en la calculadora, lo que genera problemas en los presupuestos.", "No permite estimar más de un servicio a la vez.", "La estimación puede no ser exacta, por lo que a veces es mejor empezar con un uso real y revisar la factura.", "Solo puede usarse con cuentas de pago."], correcta: 2 },
        { enunciado: "Al realizar una estimación en la AWS Pricing Calculator, ¿qué combinación de factores suele tener un impacto más alto en el coste final?", opciones: ["Tipo de servicio, tamaño del recurso, horas de uso y región seleccionada.", "Número de usuarios IAM, políticas de permisos y grupos asignados.", "Zona de disponibilidad elegida, nombre del recurso y etiquetas aplicadas.", "Ninguna de las anteriores."], correcta: 0 },
        { enunciado: "¿Qué es Amazon EC2 dentro de los servicios de AWS?", opciones: ["Un servicio para crear y gestionar máquinas virtuales bajo demanda.", "Un sistema de almacenamiento de archivos distribuido.", "Un servicio de bases de datos gestionadas.", "Un servicio de computación serverless donde no es necesario levantar servidores."], correcta: 0 },
        { enunciado: "¿Cuál es la función principal de Amazon S3?", opciones: ["Ejecutar aplicaciones sin necesidad de servidores.", "Crear redes privadas virtuales en la nube.", "Proporcionar almacenamiento de objetos escalable.", "Gestionar usuarios y permisos."], correcta: 2 },
        { enunciado: "Según el modelo de responsabilidad compartida de AWS, ¿qué tarea es responsabilidad del cliente al usar una instancia EC2?", opciones: ["La seguridad física del centro de datos.", "La infraestructura de virtualización.", "El mantenimiento del hardware del servidor.", "La actualización y configuración del sistema operativo de la instancia."], correcta: 3 },
        { enunciado: "En el modelo de responsabilidad compartida de AWS, ¿quién es responsable de la capa de virtualización que permite ejecutar instancias EC2?", opciones: ["El cliente, ya que decide el tipo de instancia y el sistema operativo.", "El cliente, porque configura la red y los grupos de seguridad.", "AWS, ya que gestiona el hipervisor y la infraestructura de virtualización.", "Ambos, de forma compartida y configurable."], correcta: 2 },
        { enunciado: "¿Qué responsabilidad NO asume AWS en el modelo de responsabilidad compartida?", opciones: ["La seguridad física de los centros de datos.", "El mantenimiento del hardware subyacente.", "La configuración del sistema operativo.", "La infraestructura global de red."], correcta: 2 },
        { enunciado: "¿Qué es un usuario de IAM en AWS?", opciones: ["Un recurso que define permisos sobre otros servicios.", "Una persona o aplicación que puede autenticarse en una cuenta de AWS.", "Un conjunto de permisos reutilizables.", "Un mecanismo para conectar cuentas entre regiones."], correcta: 1 },
        { enunciado: "¿Qué es una política de IAM y en qué formato están escritas normalmente?", opciones: ["Un conjunto de reglas de red escritas en YAML.", "Un usuario especial con permisos administrativos.", "Un documento que define permisos sobre recursos y que está escrito en formato JSON.", "Un rol que se asigna automáticamente a los servicios de AWS."], correcta: 2 },
        { enunciado: "Una empresa quiere que varias aplicaciones en EC2 accedan a Amazon S3 sin usar usuarios ni contraseñas. ¿Cuál es la opción MÁS adecuada en IAM?", opciones: ["Crear un usuario de IAM y compartir sus credenciales.", "Asignar una política directamente al bucket de S3.", "Utilizar un rol de IAM asociado a la instancia EC2.", "Añadir los permisos al usuario root."], correcta: 2 },
        { enunciado: "Según el modelo de responsabilidad compartida de AWS, ¿quién es el responsable de gestionar la seguridad de una aplicación y de los datos que utiliza?", opciones: ["AWS, ya que la aplicación se ejecuta en su infraestructura.", "AWS, siempre que se utilicen servicios en la nube.", "Ambos, pero solo cuando se usan servicios serverless.", "El cliente, ya que es responsable de la seguridad en la nube (aplicaciones y datos)."], correcta: 3 },
        { enunciado: "¿Cuál de las siguientes afirmaciones describe MEJOR el concepto de computación en la nube?", opciones: ["Un sistema de virtualización que permite ejecutar múltiples máquinas virtuales en servidores locales.", "Un protocolo de red que conecta los centros de datos de una empresa con sus oficinas remotas.", "Un servicio exclusivo de almacenamiento remoto para empresas con necesidades de backup.", "Un modelo que facilita el acceso bajo demanda a recursos de TI a través de internet, sin necesidad de infraestructura propia."], correcta: 3 },
        { enunciado: "Dada una dirección IPv4 como 192.0.2.0, ¿cuál de las siguientes afirmaciones es correcta?", opciones: ["Cada número decimal de la dirección IPv4 se representa usando 4 bits.", "Cada uno de los cuatro bloques de la dirección IPv4 se representa con 8 bits.", "La dirección IPv4 completa se representa usando 16 bits.", "El valor decimal máximo que puede tomar uno de los bloques es 512."], correcta: 1 },
        { enunciado: "Una startup quiere lanzar su primera aplicación web sin invertir capital en servidores. ¿Qué ventaja financiera fundamental ofrece la nube frente al modelo tradicional on-premise?", opciones: ["Garantiza costes nulos durante los primeros meses de operación para startups.", "Permite externalizar completamente el equipo de TI al proveedor cloud.", "Convierte los costes de infraestructura de gasto fijo e inicial en gasto variable según el consumo real.", "Elimina la necesidad de contratar soporte técnico especializado."], correcta: 2 },
        { enunciado: "¿Por qué fue necesario introducir el protocolo IPv6 frente a IPv4?", opciones: ["Porque IPv6 utiliza un formato de direcciones más legible que IPv4.", "Porque IPv4 no permite el uso de direcciones en formato hexadecimal.", "Porque el número de direcciones disponibles en IPv4 es insuficiente.", "Porque IPv6 sustituye completamente a los protocolos de enrutamiento."], correcta: 2 },
        { enunciado: "¿Qué rango de direcciones IP representa la red 192.168.1.0/24?", opciones: ["Desde 192.168.1.0 hasta 192.168.1.255.", "Desde 192.168.1.1 hasta 192.168.1.24.", "Desde 192.168.0.0 hasta 192.168.255.255.", "Desde 192.168.1.0 hasta 192.168.1.24."], correcta: 0 },
        { enunciado: "En el modelo IaaS de computación en la nube, ¿qué componentes de la pila tecnológica son responsabilidad del usuario?", opciones: ["Solo las aplicaciones y los datos de negocio que despliega en la plataforma.", "Únicamente el sistema operativo, ya que el resto lo gestiona el proveedor.", "Desde el networking físico hasta las aplicaciones, incluyendo toda la pila tecnológica.", "El sistema operativo, middleware, runtime, aplicaciones y datos."], correcta: 3 },
        { enunciado: "¿Cuál de las siguientes opciones describe correctamente una función de una puerta de enlace a Internet (Internet Gateway) en una VPC?", opciones: ["Permitir la comunicación privada entre subredes dentro de la misma VPC sin acceso a Internet.", "Proporcionar acceso a Internet únicamente para instancias que no tienen direcciones IP públicas.", "Actuar como destino en las tablas de enrutamiento para el tráfico que debe salir a Internet.", "Ninguna de las anteriores."], correcta: 2 },
        { enunciado: "¿Qué es una VPC (Virtual Private Cloud) en AWS y para qué sirve?", opciones: ["Un servicio para crear máquinas virtuales aisladas dentro de una región de AWS.", "Una red privada virtual aislada donde se despliegan y conectan los recursos de AWS.", "Un servicio de almacenamiento privado cifrado para datos sensibles de la empresa.", "Un sistema de monitorización del tráfico de red entre servicios de AWS."], correcta: 1 },
        { enunciado: "Al planificar el despliegue de una infraestructura en AWS, ¿cuál de los siguientes NO es un criterio válido para seleccionar la región?", opciones: ["La proximidad geográfica a los usuarios finales para minimizar la latencia.", "La posibilidad de acceder físicamente a los centros de datos para labores de mantenimiento del equipo propio.", "El cumplimiento de regulaciones locales de protección de datos.", "Las diferencias de precio entre regiones para optimizar costes."], correcta: 1 },
      ];

      const TOTAL_PREGUNTAS = Math.min(30, preguntas.length);
      const SUBJECT_NAME = 'Test Nube Repaso Completo';

      function shuffle(list) {
        const copy = [...list];
        for (let i = copy.length - 1; i > 0; i--) {
          const j = Math.floor(Math.random() * (i + 1));
          [copy[i], copy[j]] = [copy[j], copy[i]];
        }
        return copy;
      }

      function obtenerTestAleatorio() {
        return shuffle(preguntas).slice(0, TOTAL_PREGUNTAS);
      }

      function TestInteractivo() {
        const [preguntasMostradas, setPreguntasMostradas] = React.useState(() => obtenerTestAleatorio());
        const [respuestas, setRespuestas] = React.useState(() => Array(TOTAL_PREGUNTAS).fill(null));
        const [corregido, setCorregido] = React.useState(false);

        const respondidas = respuestas.filter(r => r !== null).length;
        const aciertos = respuestas.reduce((acc, r, i) => r !== null && r === preguntasMostradas[i]?.correcta ? acc + 1 : acc, 0);
        const fallos = respuestas.reduce((acc, r, i) => r !== null && r !== preguntasMostradas[i]?.correcta ? acc + 1 : acc, 0);
        const enBlanco = preguntasMostradas.length - respondidas;
        const puntaje = ((aciertos * 0.33) - (fallos * 0.11)).toFixed(2);
        const puntuacionMaxima = preguntasMostradas.length * 0.33;
        const porcentaje = puntuacionMaxima ? Math.max(0, Math.round((Number(puntaje) / puntuacionMaxima) * 100)) : 0;

        const seleccionar = (pIndex, rIndex) => {
          if (corregido) return;
          const copia = [...respuestas];
          copia[pIndex] = copia[pIndex] === rIndex ? null : rIndex;
          setRespuestas(copia);
        };

        const corregirTest = () => {
          if (window.ErrorLab && typeof window.ErrorLab.recordFailures === 'function') {
            window.ErrorLab.recordFailures(SUBJECT_NAME, preguntasMostradas, respuestas);
          }
          setCorregido(true);
        };

        const reiniciar = () => {
          const nuevo = obtenerTestAleatorio();
          setPreguntasMostradas(nuevo);
          setRespuestas(Array(nuevo.length).fill(null));
          setCorregido(false);
          window.scrollTo({ top: 0, behavior: 'smooth' });
        };

        return (
          <div className="page-shell">
            <div className="test-container">
              <div className="topbar">
                <a href="../index.html" className="back-link back-link-final">
                  <span className="neon-arrow">←</span> Volver al portal
                </a>
              </div>

              <section className="hero" style={{ padding: '28px 24px' }}>
                <span className="badge">☁️ Test Nube Repaso Completo</span>
                <h1 className="test-title">Test Nube Repaso Completo</h1>
                <p className="lead">
                  Repaso ASIR1 — Test AWS y Cloud. {preguntas.length} preguntas en el banco, {TOTAL_PREGUNTAS} aleatorias por intento.
                </p>
                <p className="lead" style={{ marginTop: '10px', fontSize: '0.98rem' }}>
                  Sistema de puntuación: correcta +0,33, incorrecta −0,11, en blanco 0.
                </p>
                <div className="stats">
                  <div className="stat"><b>{preguntasMostradas.length}</b>Preguntas</div>
                  <div className="stat"><b>{respondidas}</b>Respondidas</div>
                  <div className="stat"><b>{corregido ? puntaje : '—'}</b>Puntos</div>
                </div>
              </section>

              <div style={{ height: '18px' }} />

              {preguntasMostradas.map((p, i) => (
                <div key={i} className={`card${corregido && respuestas[i] === null ? ' card-blank' : ''}`}>
                  <h2 className="question-title">{i + 1}. {p.enunciado}</h2>
                  {p.opciones.map((op, j) => {
                    const seleccionado = respuestas[i] === j;
                    const esCorrecta = p.correcta === j;
                    let clases = 'answer-btn';
                    if (seleccionado) clases += ' answer-selected';
                    if (corregido && respuestas[i] !== null && seleccionado && !esCorrecta) clases += ' answer-wrong';
                    if (corregido && respuestas[i] !== null && esCorrecta) clases += ' answer-correct';
                    return <button key={j} onClick={() => seleccionar(i, j)} className={clases}>{op}</button>;
                  })}
                </div>
              ))}

              <div className="result-section">
                <div className="actions">
                  <a href="../index.html" className="back-link back-link-final">
                    <span className="neon-arrow">←</span> Volver al portal
                  </a>
                  <button className="btn-correct" onClick={corregirTest}>Corregir test</button>
                  <button className="btn-reset" onClick={reiniciar}>Reiniciar</button>
                </div>
                {corregido && (
                  <>
                    <p className="result-text">Puntuación: {puntaje} puntos</p>
                    <p className="result-sub">{aciertos} correctas, {fallos} incorrectas y {enBlanco} en blanco.</p>
                    <div className="progress"><span style={{ width: `${porcentaje}%` }}></span></div>
                  </>
                )}
              </div>

              <footer>Preguntas del repaso de Nube/AWS del profesor. Preparado para GitHub Pages.</footer>
            </div>
          </div>
        );
      }

      ReactDOM.createRoot(document.getElementById('root')).render(<TestInteractivo />);
    </script>
  </body>
</html>
